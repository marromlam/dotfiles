# Status bar configuration
# Requires a theme (colors.conf or a themes/*.tmux) to be sourced first

# ------------------------------------------------------------------------------
# General options {{{
# ------------------------------------------------------------------------------

set-option -g status on
set-option -g status-position top
set-option -g status-style fg=$STATUS_BAR_FG_COLOR,bg=$STATUS_BAR_BG_COLOR
set-option -g status-justify absolute-centre
set-option -g status-interval 10
set -g status-left-length 30
set -g status-right-length 30

SESSION_ICON="¾▒é¼"
BELL_ICON="ÔÜÿ"

# }}}


# ------------------------------------------------------------------------------
# Pane borders & messages {{{
# ------------------------------------------------------------------------------

set-option -g pane-active-border-style fg=$STATUS_BAR_FG_COLOR
set-option -g pane-border-style fg=$INACTIVE_FG_COLOR

set-option -g message-style bg=$STATUS_BAR_FG_COLOR,fg=$STATUS_BAR_BG_COLOR,bold
set-option -g message-command-style bg=$STATUS_BAR_FG_COLOR,fg=$STATUS_BAR_BG_COLOR,bold

set-option -g monitor-activity off
set-option -g visual-activity off

# }}}


# ------------------------------------------------------------------------------
# Battery plugin icons {{{
# ------------------------------------------------------------------------------

# Status icons (charged/charging/discharging state)
set -g @batt_icon_status_charged    "´ëÇ"
set -g @batt_icon_status_attached   "´ëÇ"
set -g @batt_icon_status_charging   "´âº"
set -g @batt_icon_status_discharging "´ëä"
set -g @batt_icon_status_unknown    "´ëä"

# Charge tier icons (used by #{battery_icon}, 8 tiers from full to empty)
set -g @batt_icon_charge_tier8 "´ëÇ"
set -g @batt_icon_charge_tier7 "´ëü"
set -g @batt_icon_charge_tier6 "´ëü"
set -g @batt_icon_charge_tier5 "´ëé"
set -g @batt_icon_charge_tier4 "´ëé"
set -g @batt_icon_charge_tier3 "´ëâ"
set -g @batt_icon_charge_tier2 "´ëâ"
set -g @batt_icon_charge_tier1 "´ëä"

set -g @batt_remain_short 'true'

# }}}


# ------------------------------------------------------------------------------
# Status left ÔÇö session bubble (prefix-aware) + pomodoro {{{
# ------------------------------------------------------------------------------

STATUS_INACTIVE=""\
"#[fg=$SESSION_BUBBLE_FG_COLOR bg=$SESSION_BUBBLE_BG_COLOR]$LBORDER"\
"#[fg=$SESSION_BUBBLE_BG_COLOR bg=$SESSION_BUBBLE_FG_COLOR]$SESSION_INNER_BORDER$SESSION_ICON #S$SESSION_INNER_BORDER"\
"#[fg=$SESSION_BUBBLE_FG_COLOR bg=$SESSION_BUBBLE_BG_COLOR]$RBORDER"

STATUS_ACTIVE=""\
"#[fg=$SESSION_BUBBLEON_FG_COLOR bg=$SESSION_BUBBLEON_BG_COLOR]$LBORDER"\
"#[fg=$SESSION_BUBBLEON_BG_COLOR bg=$SESSION_BUBBLEON_FG_COLOR]$SESSION_INNER_BORDER$SESSION_ICON #S$SESSION_INNER_BORDER"\
"#[fg=$SESSION_BUBBLEON_FG_COLOR bg=$SESSION_BUBBLEON_BG_COLOR]$RBORDER"

set-option -g status-left "#{?client_prefix,$STATUS_ACTIVE,$STATUS_INACTIVE}#[default]  #{pomodoro_status}#[default]"

# }}}


# ------------------------------------------------------------------------------
# Status right ÔÇö date + time + battery {{{
# ------------------------------------------------------------------------------

CALHOUR=" #[italics]%d/%m #[noitalics]%H:%M"
BATTERY=" #[fg=$SESSION_BUBBLE_BG_COLOR,bg=$SESSION_BUBBLE_FG_COLOR]#{battery_icon} #{battery_remain}"

STATUS_RIGHT="$CALHOUR$BATTERY"
STATUS_RIGHT="#[fg=$SESSION_BUBBLE_FG_COLOR bg=$SESSION_BUBBLE_BG_COLOR]$LBORDER"\
"#[fg=$SESSION_BUBBLE_BG_COLOR bg=$SESSION_BUBBLE_FG_COLOR]$STATUS_RIGHT"\
"#[fg=$SESSION_BUBBLE_FG_COLOR bg=$SESSION_BUBBLE_BG_COLOR]$RBORDER"

set-option -g status-right "$STATUS_RIGHT#[default] "

# }}}


# ------------------------------------------------------------------------------
# Window formatting {{{
# ------------------------------------------------------------------------------

LICON="$WINDOW_INNER_BORDER#{?window_bell_flag,#[fg=$ACTIVE_FG_COLOR]$BELL_ICON, }"
RICON="#{?window_active,#{?window_zoomed_flag,Ôºë, }, }$WINDOW_INNER_BORDER"

WNUM='#($HOME/.config/tmux/helpers/window_to_num #I) '

WINDOW_INACTIVE=""\
"#[bg=$WINDOW_BUBBLE_BG_COLOR fg=$WINDOW_BUBBLE_FG_COLOR]"\
"#[bg=$WINDOW_BUBBLE_FG_COLOR fg=$WINDOW_BUBBLE_BG_COLOR]$LICON"\
"#[dim]${WNUM}#W"\
"$RICON#[bg=$WINDOW_BUBBLE_BG_COLOR,fg=$WINDOW_BUBBLE_FG_COLOR,nodim]"

WINDOW_ACTIVE=""\
"#[bg=$WINDOW_BUBBLEON_BG_COLOR fg=$WINDOW_BUBBLEON_FG_COLOR]"\
"#[bg=$WINDOW_BUBBLEON_FG_COLOR fg=$WINDOW_BUBBLEON_BG_COLOR]$LICON"\
"#[bold]${WNUM}#W"\
"$RICON#[bg=$WINDOW_BUBBLEON_BG_COLOR fg=$WINDOW_BUBBLEON_FG_COLOR]"

set-window-option -g window-status-format "$WINDOW_INACTIVE"
set-window-option -g window-status-current-format "$WINDOW_ACTIVE"
set-window-option -g window-status-separator " "

# }}}

# vim: ft=tmux fdm=marker
