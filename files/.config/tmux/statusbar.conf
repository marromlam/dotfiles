# Status bar configuration
# Requires a theme (colors.conf or a themes/*.tmux) to be sourced first

# ------------------------------------------------------------------------------
# General options {{{
# ------------------------------------------------------------------------------

set-option -g status on
set-option -g status-position top
set-option -g status-style fg=$STATUS_BAR_FG_COLOR,bg=$STATUS_BAR_BG_COLOR
set-option -g status-justify absolute-centre
set-option -g status-interval 10
set -g status-left-length 30
set -g status-right-length 30

SESSION_ICON="󱂬"
SESSION_ICON="󰙀"
SESSION_INNER_BORDER=""
BELL_ICON=""
LBORDER=""
RBORDER=""
# LBORDER="█"
# RBORDER="█"

# }}}


# ------------------------------------------------------------------------------
# Pane borders & messages {{{
# ------------------------------------------------------------------------------

set-option -g pane-active-border-style fg=$STATUS_BAR_FG_COLOR
set-option -g pane-border-style fg=$INACTIVE_FG_COLOR

set-option -g message-style bg=$STATUS_BAR_FG_COLOR,fg=$STATUS_BAR_BG_COLOR,bold
set-option -g message-command-style bg=$STATUS_BAR_FG_COLOR,fg=$STATUS_BAR_BG_COLOR,bold

set-option -g monitor-activity off
set-option -g visual-activity off

# }}}


# ------------------------------------------------------------------------------
# Battery plugin icons {{{
# ------------------------------------------------------------------------------

# Status icons (charged/charging/discharging state)
set -g @batt_icon_status_charged    ""
set -g @batt_icon_status_attached   ""
set -g @batt_icon_status_charging   ""
set -g @batt_icon_status_discharging ""
set -g @batt_icon_status_unknown    ""

# Charge tier icons (used by #{battery_icon}, 8 tiers from full to empty)
set -g @batt_icon_charge_tier8 ""
set -g @batt_icon_charge_tier7 ""
set -g @batt_icon_charge_tier6 ""
set -g @batt_icon_charge_tier5 ""
set -g @batt_icon_charge_tier4 ""
set -g @batt_icon_charge_tier3 ""
set -g @batt_icon_charge_tier2 ""
set -g @batt_icon_charge_tier1 ""

set -g @batt_remain_short 'true'

# }}}


# ------------------------------------------------------------------------------
# Status left — session bubble (prefix-aware) + pomodoro {{{
# ------------------------------------------------------------------------------

STATUS_INACTIVE=""\
"#[fg=$SESSION_BUBBLE_FG_COLOR bg=$SESSION_BUBBLE_ZG_COLOR]$LBORDER"\
"#[fg=$SESSION_BUBBLE_BG_COLOR bg=$SESSION_BUBBLE_FG_COLOR]$SESSION_INNER_BORDER$SESSION_ICON #S$SESSION_INNER_BORDER"\
"#[fg=$SESSION_BUBBLE_FG_COLOR bg=$SESSION_BUBBLE_ZG_COLOR]$RBORDER"

STATUS_ACTIVE=""\
"#[fg=$SESSION_BUBBLEON_FG_COLOR bg=$SESSION_BUBBLEON_ZG_COLOR]$LBORDER"\
"#[fg=$SESSION_BUBBLEON_BG_COLOR bg=$SESSION_BUBBLEON_FG_COLOR]$SESSION_INNER_BORDER$SESSION_ICON #S$SESSION_INNER_BORDER"\
"#[fg=$SESSION_BUBBLEON_FG_COLOR bg=$SESSION_BUBBLEON_ZG_COLOR]$RBORDER"

set-option -g status-left "#{?client_prefix,$STATUS_ACTIVE,$STATUS_INACTIVE}#[default]  #{pomodoro_status}#[default]"

# }}}


# ------------------------------------------------------------------------------
# Status right — copilot usage + date + time + battery {{{
# ------------------------------------------------------------------------------

CALHOUR=" #[italics]%d/%m #[noitalics]%H:%M"
BATTERY=" #[fg=$SESSION_BUBBLE_BG_COLOR,bg=$SESSION_BUBBLE_FG_COLOR]#{battery_icon} #{battery_remain}"
COPILOT="#(~/.config/tmux/plugins/agent-usage/scripts/agent_usage.sh)"

STATUS_RIGHT="$COPILOT $CALHOUR"
# STATUS_RIGHT="$CALHOUR$BATTERY"
STATUS_RIGHT="#[fg=$SESSION_BUBBLE_FG_COLOR bg=$SESSION_BUBBLE_ZG_COLOR]$LBORDER"\
"#[fg=$SESSION_BUBBLE_BG_COLOR bg=$SESSION_BUBBLE_FG_COLOR]$STATUS_RIGHT"\
"#[fg=$SESSION_BUBBLE_FG_COLOR bg=$SESSION_BUBBLE_ZG_COLOR]$RBORDER"

# }}}


# ------------------------------------------------------------------------------
# Window formatting {{{
# ------------------------------------------------------------------------------

LICON="#{?window_bell_flag,#[fg=$ACTIVE_FG_COLOR]$BELL_ICON, }"
RICON="#{?window_active,#{?window_zoomed_flag,⧉, }, }"

WNUM='#($HOME/.config/tmux/helpers/window_to_num #I) '

WINDOW_INACTIVE=""\
"#[bg=$WINDOW_BUBBLE_ZG_COLOR fg=$WINDOW_BUBBLE_BG_COLOR]$LBORDER"\
"#[bg=$WINDOW_BUBBLE_BG_COLOR fg=$WINDOW_BUBBLE_FG_COLOR]$LICON"\
"#[dim]${WNUM}#W#[nodim]"\
"#[bg=$WINDOW_BUBBLE_BG_COLOR fg=$WINDOW_BUBBLE_FG_COLOR]$RICON"\
"#[bg=$WINDOW_BUBBLE_ZG_COLOR,fg=$WINDOW_BUBBLE_BG_COLOR]$RBORDER"

WINDOW_ACTIVE=""\
"#[bg=$WINDOW_BUBBLEON_ZG_COLOR fg=$WINDOW_BUBBLEON_BG_COLOR]$LBORDER"\
"#[bg=$WINDOW_BUBBLEON_BG_COLOR fg=$WINDOW_BUBBLEON_FG_COLOR]$LICON"\
"#[bold]${WNUM}#W#[nobold]"\
"#[bg=$WINDOW_BUBBLEON_BG_COLOR fg=$WINDOW_BUBBLEON_FG_COLOR]$RICON"\
"#[bg=$WINDOW_BUBBLEON_ZG_COLOR,fg=$WINDOW_BUBBLEON_BG_COLOR]$RBORDER"

set-window-option -g window-status-format "$WINDOW_INACTIVE"
set-window-option -g window-status-current-format "$WINDOW_ACTIVE"
set-window-option -g window-status-separator " "

# }}}

# vim: ft=tmux fdm=marker
